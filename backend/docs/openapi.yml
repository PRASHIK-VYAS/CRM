openapi: "3.0.3"
info:
  title: EduBridge Enterprise API
  description: |
    REST API for EduBridge Enterprise — Institutional CRM for Training & Placement Offices.
    Includes the new Enterprise endpoints: Institutional Dashboard, TPO Sync, MoU Vault, and AI Email Generation.
  version: "2.0.0"
  contact:
    name: TrailBlazers Development Team

servers:
  - url: http://localhost:5000
    description: Local development
  - url: https://api.edubridge.example.com
    description: Production

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ─── Core Entities ─────────────────────────────────────────

    Company360:
      type: object
      properties:
        id: { type: string, format: uuid }
        companyCode: { type: string }
        companyName: { type: string }
        industry: { type: string }
        dealStatus: { type: string, enum: [ACTIVE, ON_HOLD, LOST, WON] }
        phoneNumber: { type: string }
        hireKey: { type: string, enum: [Head, Co-head] }
        healthScore: { type: integer }
        relationshipStage: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }

    MoU:
      type: object
      properties:
        id: { type: string, format: uuid }
        mouNumber: { type: string }
        title: { type: string }
        companyId: { type: string, format: uuid }
        departmentId: { type: string, format: uuid }
        deliverableType:
          type: string
          enum: [PART_A_SEMINARS, PART_B_HIGHER_STUDIES, BOTH]
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        signedDate: { type: string, format: date }
        status:
          type: string
          enum: [DRAFT, PENDING, ACTIVE, EXPIRED, TERMINATED, RENEWED]
        collaborationType: { type: string }
        createdAt: { type: string, format: date-time }

    PlacementDrive:
      type: object
      properties:
        id: { type: string, format: uuid }
        companyId: { type: string, format: uuid }
        driveDate: { type: string, format: date }
        jobTitle: { type: string }
        studentsAppeared: { type: integer }
        studentsSelected: { type: integer }
        package: { type: number, format: decimal }
        notes: { type: string }
        createdAt: { type: string, format: date-time }

    ActivityLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        companyId: { type: string, format: uuid }
        type: { type: string, enum: [CALL, EMAIL, MEETING, NOTE] }
        subject: { type: string }
        description: { type: string }
        performedBy: { type: integer }
        createdAt: { type: string, format: date-time }

    Department:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        code: { type: string }
        isActive: { type: boolean }

    # ─── Enterprise Endpoint Schemas ────────────────────────────

    InstitutionalDashboardResponse:
      type: object
      properties:
        totalStudents: { type: integer, example: 5000 }
        highestPackage: { type: number, example: 2500000 }
        averagePackage: { type: number, example: 650000 }
        companyWiseDistribution:
          type: array
          items:
            type: object
            properties:
              company: { type: string, example: Google }
              students: { type: integer, example: 12 }
              avgPackage: { type: number, example: 2400000 }

    TpoSyncRequest:
      type: object
      required: [companyId, driveDate, jobTitle]
      properties:
        companyId: { type: string, format: uuid }
        driveDate: { type: string, format: date }
        jobTitle: { type: string }
        studentsAppeared: { type: integer, default: 0 }
        studentsSelected: { type: integer, default: 0 }
        package: { type: number, format: decimal }

    AiEmailRequest:
      type: object
      required: [companyName, recipientName, context]
      properties:
        companyName: { type: string }
        recipientName: { type: string }
        recipientTitle: { type: string }
        context: { type: string }
        tone:
          type: string
          enum: [professional, friendly, formal, persuasive]
          default: professional
        previousInteraction: { type: string }

    AiEmailResponse:
      type: object
      properties:
        subject: { type: string, example: "Collaboration Opportunity with EduBridge" }
        body: { type: string, example: "Dear John,\n\nI hope this message finds you well..." }

    MoUCreateRequest:
      type: object
      required: [mouNumber, title, companyId, startDate, endDate, signedDate, collaborationType]
      properties:
        mouNumber: { type: string }
        title: { type: string }
        companyId: { type: string, format: uuid }
        departmentId: { type: string, format: uuid }
        deliverableType:
          type: string
          enum: [PART_A_SEMINARS, PART_B_HIGHER_STUDIES, BOTH]
          default: PART_A_SEMINARS
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        signedDate: { type: string, format: date }
        collaborationType: { type: string }
        purpose: { type: string }
        signedByCompany: { type: string }
        signedByInstitute: { type: string }
        documentUrl: { type: string }
        remarks: { type: string }
        renewalReminderDays: { type: integer, default: 30 }

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, enum: [false] }
        message: { type: string }

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, enum: [true] }
        data: { type: object }

paths:
  # ─── Institutional Dashboard ────────────────────────────────

  /analytics/institutional-dashboard:
    get:
      summary: Get institutional dashboard data
      description: Returns total students, highest package, average package, and company-wise package distribution.
      operationId: getInstitutionalDashboard
      tags: [Analytics]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/InstitutionalDashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ─── TPO Sync ───────────────────────────────────────────────

  /api/tpo/sync-student-counts:
    post:
      summary: Ingest manual placement drive data
      description: Create or update a placement drive record with student appearance and selection counts.
      operationId: syncStudentCounts
      tags: [TPO Sync]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TpoSyncRequest"
      responses:
        "201":
          description: Placement drive created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/PlacementDrive"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ─── AI Email Generation ────────────────────────────────────

  /api/ai/generate-email:
    post:
      summary: Generate personalized outreach email
      description: Uses NVIDIA NIM API to generate a professional email draft based on company context and recipient details.
      operationId: generateEmail
      tags: [AI]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiEmailRequest"
      responses:
        "200":
          description: Generated email draft
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/AiEmailResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ─── MoU Vault (Enterprise enhancements) ────────────────────

  /api/mou:
    post:
      summary: Create a new MoU
      description: Creates a Memorandum of Understanding with support for department association and deliverable type classification (Part A / Part B).
      operationId: createMou
      tags: [MoU]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoUCreateRequest"
      responses:
        "201":
          description: MoU created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/MoU"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      summary: List MoUs
      description: List all MoUs with pagination, filtering by status, collaboration type, company, department, and date ranges.
      operationId: listMous
      tags: [MoU]
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: collaborationType
          schema: { type: string }
        - in: query
          name: companyId
          schema: { type: string, format: uuid }
        - in: query
          name: departmentId
          schema: { type: string, format: uuid }
        - in: query
          name: deliverableType
          schema: { type: string, enum: [PART_A_SEMINARS, PART_B_HIGHER_STUDIES, BOTH] }
      responses:
        "200":
          description: List of MoUs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MoU"
                  pagination:
                    type: object
                    properties:
                      page: { type: integer }
                      limit: { type: integer }
                      total: { type: integer }
                      totalPages: { type: integer }

  /api/mou/{id}:
    get:
      summary: Get MoU by ID
      operationId: getMouById
      tags: [MoU]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: MoU details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/MoU"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      summary: Update MoU status
      operationId: updateMouStatus
      tags: [MoU]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [DRAFT, PENDING, ACTIVE, EXPIRED, TERMINATED, RENEWED]
      responses:
        "200":
          description: MoU status updated
        "404":
          $ref: "#/components/responses/NotFound"

  /api/mou/company/{companyId}:
    get:
      summary: Get MoUs by company
      operationId: getMousByCompany
      tags: [MoU]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: companyId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Company MoUs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MoU"

  /api/mou/statistics:
    get:
      summary: Get MoU aggregate statistics
      operationId: getMouStatistics
      tags: [MoU]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: MoU statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      total: { type: integer }
                      active: { type: integer }
                      expiringSoon: { type: integer }
                      byDeliverableType:
                        type: object
                        properties:
                          PART_A_SEMINARS: { type: integer }
                          PART_B_HIGHER_STUDIES: { type: integer }
                          BOTH: { type: integer }

  # ─── Shared Responses ──────────────────────────────────────

  /api/activity-logs:
    get:
      summary: List activity logs for a company
      description: Returns shared call/email/meeting history visible to all admin roles.
      operationId: listActivityLogs
      tags: [Activity Logs]
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: companyId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: type
          schema: { type: string, enum: [CALL, EMAIL, MEETING, NOTE] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Activity logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityLog"

    post:
      summary: Create activity log entry
      description: Record a shared call/email/meeting entry visible to all admins.
      operationId: createActivityLog
      tags: [Activity Logs]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [companyId, type, subject]
              properties:
                companyId: { type: string, format: uuid }
                type: { type: string, enum: [CALL, EMAIL, MEETING, NOTE] }
                subject: { type: string }
                description: { type: string }
      responses:
        "201":
          description: Activity log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLog"

responses:
  Unauthorized:
    description: Missing or invalid authentication token
    content:
      application/json:
        schema:
          $ref: "#/components/schemas/ErrorResponse"
  NotFound:
    description: Resource not found
    content:
      application/json:
        schema:
          $ref: "#/components/schemas/ErrorResponse"
  ValidationError:
    description: Request validation failed
    content:
      application/json:
        schema:
          $ref: "#/components/schemas/ErrorResponse"
  InternalError:
    description: Internal server error
    content:
      application/json:
        schema:
          $ref: "#/components/schemas/ErrorResponse"
